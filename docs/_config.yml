title: "Overview GitHub Spec-kit"
description: "Workshop — Accelerate software development with AI-powered specification and implementation using GitHub Copilot Spec-kit"
baseurl: "/Overview-Github-Spec-kit"
url: "https://ibranibeny.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light
search_enabled: true
search.button: true

heading_anchors: true
permalink: pretty

aux_links:
  "GitHub Repo":
    - "https://github.com/ibranibeny/Overview-Github-Spec-kit"

aux_links_new_tab: true

nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Overview GitHub Spec-kit Workshop &mdash; Microsoft Indonesia"

exclude:
  - "*.drawio"
  - "*.bkp"

mermaid:
  version: "11"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
